<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quality Outfitters</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="cursor"></div>

<!-- NAV -->
<nav class="nav">
  <h1 class="logo">QO</h1>
  <ul class="nav-links">
    <li>Home</li>
    <li>Shop</li>
    <li>About</li>
    <li>Contact</li>
  </ul>
</nav>

<!-- HERO -->
<header class="hero">
  <div class="hero-text">
    <h1 class="hero-title">Wear Confidence</h1>
    <p class="hero-subtitle">Minimal. Modern. Premium streetwear.</p>
    <a href="#products" class="hero-cta">Shop Now</a>
  </div>
</header>

<!-- PRODUCTS GRID -->
<section class="products" id="products">
  <div class="card">
    <img src="https://via.placeholder.com/400x400?text=Black+Hoodie" />
    <div class="card-info">
      <h2>Black Hoodie</h2>
      <p>$40</p>
      <button>Add to Cart</button>
    </div>
  </div>
  <div class="card">
    <img src="https://via.placeholder.com/400x400?text=White+Tee" />
    <div class="card-info">
      <h2>White Tee</h2>
      <p>$25</p>
      <button>Add to Cart</button>
    </div>
  </div>
  <div class="card">
    <img src="https://via.placeholder.com/400x400?text=Minimal+Jacket" />
    <div class="card-info">
      <h2>Minimal Jacket</h2>
      <p>$80</p>
      <button>Add to Cart</button>
    </div>
  </div>
</section>

<!-- FLOATING CART BUTTON -->
<div class="floating-btn" id="cartBtn">🛒</div>

<script src="script.js"></script>
</body>
</html>
